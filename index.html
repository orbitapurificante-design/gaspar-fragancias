<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>GASPAR — Fragrâncias do Oriente</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#211915">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GASPAR">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#211915;
    --bg2:#2a201b;
    --bg3:#362a23;
    --gold:#d4a24a;
    --gold-soft:#b88a42;
    --oxblood:#8a2c3d;
    --ivory:#f6eee0;
    --ivory-dim:#bcac9a;
    --line:rgba(212,162,74,.22);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ivory);font-family:'Jost',sans-serif;overflow-x:hidden}
  body{background:linear-gradient(180deg,#241c17 0%, var(--bg) 340px, var(--bg) 100%)}
  ::selection{background:var(--gold);color:#140f0d}
  a{color:inherit}

  /* HERO */
  .hero{position:relative;padding:56px 20px 34px;text-align:center;overflow:hidden}
  .hero::before{content:'';position:absolute;inset:0;
    background:radial-gradient(ellipse 70% 55% at 50% 0%, rgba(201,150,63,.16), transparent 70%);
    pointer-events:none}
  .brand{position:relative;font-family:'Cormorant Garamond',serif;font-weight:600;
    font-size:clamp(38px,10vw,58px);letter-spacing:6px;margin:0;color:var(--ivory);
    text-shadow:0 0 30px rgba(201,150,63,.25)}
  .tagline{position:relative;font-size:11px;letter-spacing:5px;text-transform:uppercase;
    color:var(--gold);margin-top:10px;font-weight:500}
  .divider{position:relative;display:flex;align-items:center;justify-content:center;gap:10px;margin:22px auto 0;max-width:220px}
  .divider .ln{height:1px;flex:1;background:linear-gradient(90deg,transparent,var(--line),transparent)}
  .divider .dot{width:5px;height:5px;border-radius:50%;background:var(--gold);opacity:.85}

  /* TABS */
  .tabsWrap{position:sticky;top:0;z-index:40;background:linear-gradient(var(--bg) 78%, transparent);padding:14px 16px 10px;backdrop-filter:blur(6px)}
  .tabs{display:flex;justify-content:center;gap:4px;max-width:520px;margin:0 auto;position:relative;border-bottom:1px solid var(--line)}
  .tab{flex:1;text-align:center;padding:10px 6px 12px;font-size:12px;letter-spacing:1.6px;text-transform:uppercase;
    color:var(--ivory-dim);cursor:pointer;font-weight:600;transition:color .25s;user-select:none;white-space:nowrap}
  .tab.on{color:var(--gold)}
  .tabIndicator{position:absolute;bottom:-1px;height:2px;background:var(--gold);box-shadow:0 0 8px rgba(201,150,63,.6);
    transition:left .3s cubic-bezier(.4,0,.2,1), width .3s cubic-bezier(.4,0,.2,1)}

  /* GRID */
  .wrap{max-width:720px;margin:0 auto;padding:6px 14px 120px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:10px}
  @media(min-width:560px){.grid{grid-template-columns:1fr 1fr 1fr}}
  .card{background:var(--bg2);border:1px solid var(--line);border-radius:14px;overflow:hidden;
    display:flex;flex-direction:column;position:relative;transition:border-color .2s}
  .card:hover{border-color:var(--gold-soft)}
  .cardImg{width:100%;aspect-ratio:3/4;background:var(--bg3);display:flex;align-items:center;justify-content:center;
    overflow:hidden;position:relative;cursor:pointer}
  .cardImg img{width:100%;height:100%;object-fit:cover}
  .cardImg .ph{font-size:34px;opacity:.35}

  /* DETALHE FULLSCREEN */
  .detailSheet{background:var(--bg);width:100%;max-width:600px;margin:0 auto;min-height:100vh;padding-bottom:100px}
  .detailImgWrap{position:relative;width:100%}
  .detailImg{width:100%;aspect-ratio:4/5;object-fit:cover;background:var(--bg3);display:block}
  .detailBack{position:absolute;top:16px;left:16px;background:rgba(20,15,13,.65);border:1px solid var(--line);
    color:var(--ivory);width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    cursor:pointer;backdrop-filter:blur(4px);font-size:19px}
  .detailBody{padding:20px 20px 10px}
  .detailNome{font-family:'Cormorant Garamond',serif;font-size:25px;font-weight:600;line-height:1.25}
  .detailPrice{display:flex;align-items:baseline;gap:9px;margin-top:12px}
  .detailPrice .priceOld{font-size:15px}
  .detailPrice .priceNew{font-size:21px}
  .detailDescTit{font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin-top:20px}
  .detailDesc{font-size:13.5px;line-height:1.7;color:var(--ivory-dim);margin-top:8px;white-space:pre-wrap}
  .detailFooter{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--line);
    padding:12px 16px;max-width:600px;margin:0 auto;display:flex;gap:10px;align-items:center;z-index:10}
  .genRow{display:flex;align-items:center;gap:6px;font-size:9.5px;letter-spacing:1px;
    text-transform:uppercase;color:var(--ivory-dim)}
  .genRow .d{width:6px;height:6px;border-radius:50%;flex-shrink:0}
  .cardBody{padding:10px 11px 12px;display:flex;flex-direction:column;gap:5px;flex:1}
  .cardNome{font-size:13.5px;font-weight:600;line-height:1.3;min-height:34px}
  .cardVol{font-size:10.5px;color:var(--ivory-dim);letter-spacing:.5px}
  .priceRow{display:flex;align-items:baseline;gap:7px;margin-top:auto}
  .priceOld{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:13px;color:var(--ivory-dim);
    text-decoration:line-through;text-decoration-color:var(--oxblood)}
  .priceNew{font-size:16px;font-weight:700;color:var(--gold)}
  .addRow{display:flex;align-items:center;gap:6px;margin-top:6px}
  .stepBtn{width:26px;height:26px;border-radius:8px;border:1px solid var(--line);background:var(--bg3);
    color:var(--ivory);font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;
    font-family:'Jost',sans-serif;line-height:1;flex-shrink:0}
  .stepBtn:active{background:var(--gold);color:#140f0d}
  .qtyNum{flex:1;text-align:center;font-size:13px;font-weight:600}
  .addBtn{width:100%;margin-top:8px;padding:9px 0;border:none;border-radius:9px;background:var(--gold);
    color:#140f0d;font-weight:700;font-size:11.5px;letter-spacing:1.3px;text-transform:uppercase;cursor:pointer;
    font-family:'Jost',sans-serif}

  .empty{text-align:center;padding:60px 20px;color:var(--ivory-dim)}
  .empty .e1{font-size:34px;margin-bottom:10px;opacity:.6}

  /* CART FAB */
  .fab{position:fixed;bottom:22px;right:20px;width:58px;height:58px;border-radius:50%;
    background:var(--oxblood);border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;
    box-shadow:0 8px 24px rgba(0,0,0,.45);cursor:pointer;z-index:60}
  .fabBadge{position:absolute;top:-4px;right:-4px;background:var(--gold);color:#140f0d;font-size:11px;font-weight:800;
    min-width:20px;height:20px;border-radius:10px;display:none;align-items:center;justify-content:center;
    padding:0 4px;border:2px solid var(--bg)}

  .installPill{display:none;position:fixed;bottom:26px;left:20px;align-items:center;gap:7px;background:var(--gold);
    color:#211915;font-size:11.5px;font-weight:700;letter-spacing:.5px;padding:11px 16px;border-radius:30px;
    cursor:pointer;z-index:60;box-shadow:0 8px 24px rgba(0,0,0,.4);font-family:'Jost',sans-serif}

  /* MODAL / SHEET */
  .modal{display:none;position:fixed;inset:0;z-index:200;align-items:flex-end;background:rgba(10,7,6,.6);backdrop-filter:blur(2px)}
  .modal.a{display:flex}
  .sheet{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:600px;margin:0 auto;padding:20px;
    max-height:88vh;overflow-y:auto;border-top:1px solid var(--line)}
  .sheetTop{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .sheetTit{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600}
  .closeX{background:none;border:none;color:var(--ivory-dim);font-size:26px;cursor:pointer;line-height:1}
  .cItem{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
  .cItem:last-child{border-bottom:none}
  .cImg{width:46px;height:60px;border-radius:8px;object-fit:cover;background:var(--bg3);flex-shrink:0}
  .cInfo{flex:1;min-width:0}
  .cNome{font-size:13px;font-weight:600}
  .cSub{font-size:11.5px;color:var(--ivory-dim);margin-top:2px}
  .cVal{font-size:13.5px;font-weight:700;color:var(--gold);white-space:nowrap}
  .totRow{display:flex;justify-content:space-between;align-items:center;padding:14px 0 6px;margin-top:4px}
  .totLbl{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ivory-dim)}
  .totVal{font-size:21px;font-weight:700;color:var(--gold)}
  .lbl{display:block;font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--ivory-dim);margin:14px 0 6px}
  .inp,.txt{width:100%;padding:12px 13px;background:var(--bg3);border:1px solid var(--line);border-radius:10px;
    color:var(--ivory);font-size:14px;outline:none;font-family:'Jost',sans-serif}
  .txt{resize:vertical;min-height:60px}
  .inp::placeholder,.txt::placeholder{color:#6b6055}
  .btnGold{width:100%;padding:15px 0;margin-top:16px;border:none;border-radius:12px;background:var(--gold);
    color:#140f0d;font-weight:700;font-size:13px;letter-spacing:1.3px;text-transform:uppercase;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:8px;font-family:'Jost',sans-serif}
  .btnGhost{width:100%;padding:12px 0;margin-top:8px;border:1px solid var(--line);border-radius:12px;background:none;
    color:var(--ivory-dim);font-size:12px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;font-family:'Jost',sans-serif}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#0a0706;
    color:var(--ivory);padding:12px 20px;border-radius:12px;font-size:13px;z-index:999;opacity:0;
    transition:all .3s;border:1px solid var(--line);pointer-events:none}
  .toast.v{opacity:1;transform:translateX(-50%) translateY(0)}

  footer{text-align:center;padding:26px 20px 40px;font-size:11px;color:var(--ivory-dim);letter-spacing:1px}
  @media (prefers-reduced-motion: reduce){*{transition:none !important}}
</style>
</head>
<body>

<div class="hero">
  <div class="brand">GASPAR</div>
  <div class="tagline">Fragrâncias do Oriente</div>
  <div class="divider"><span class="ln"></span><span class="dot"></span><span class="ln"></span></div>
</div>

<div class="tabsWrap">
  <div class="tabs" id="tabs">
    <div class="tab on" data-g="todos">Todos</div>
    <div class="tab" data-g="M">Masculino</div>
    <div class="tab" data-g="F">Feminino</div>
    <div class="tab" data-g="U">Unissexo</div>
    <div class="tabIndicator" id="tabInd"></div>
  </div>
</div>

<div class="wrap">
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">
    <div class="e1">🌿</div>
    Ainda não há fragrâncias nesta categoria.
  </div>
</div>

<footer>GASPAR — Fragrâncias do Oriente</footer>

<div class="fab" onclick="abrirCarrinho()">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#f3ead9" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
  <span class="fabBadge" id="fabBadge">0</span>
</div>

<div class="installPill" id="installPill" onclick="instalarApp()">
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#211915" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="M7 10l5 5 5-5"/><path d="M5 19h14"/></svg>
  Instalar App
</div>

<!-- DETALHE DO PERFUME -->
<div class="modal" id="mDetalhe" style="align-items:stretch;padding:0">
  <div class="detailSheet">
    <div class="detailImgWrap" id="detImgWrap">
      <button class="detailBack" onclick="fecharModal('mDetalhe')">←</button>
    </div>
    <div class="detailBody">
      <div class="detailNome" id="detNome"></div>
      <div class="genRow" id="detGen" style="margin-top:6px;font-size:11px"></div>
      <div class="detailPrice priceRow" id="detPrice"></div>
      <div id="detDescWrap">
        <div class="detailDescTit">Descrição</div>
        <div class="detailDesc" id="detDesc"></div>
      </div>
    </div>
  </div>
  <div class="detailFooter">
    <button class="stepBtn" onclick="cartChange(detalheAtualId,-1); atualizarDetalheQty()">−</button>
    <div class="qtyNum" id="detQty" style="min-width:24px;text-align:center">0</div>
    <button class="stepBtn" onclick="cartChange(detalheAtualId,1); atualizarDetalheQty()">+</button>
    <button class="btnGold" style="margin:0;flex:1" onclick="cartChange(detalheAtualId,1); atualizarDetalheQty()">Adicionar ao Pedido</button>
  </div>
</div>

<!-- CARRINHO -->
<div class="modal" id="mCart">
  <div class="sheet">
    <div class="sheetTop">
      <div class="sheetTit">O seu Pedido</div>
      <button class="closeX" onclick="fecharModal('mCart')">×</button>
    </div>
    <div id="cartLista"></div>
    <div class="totRow"><div class="totLbl">Total Estimado</div><div class="totVal" id="cartTotal">0.00€</div></div>
    <label class="lbl">O seu nome *</label>
    <input type="text" class="inp" id="cName" placeholder="Ex: Maria Silva">
    <label class="lbl">Observações (opcional)</label>
    <textarea class="txt" id="cNotes" placeholder="Ex: morada de entrega, preferências..."></textarea>
    <button class="btnGold" onclick="enviarWhatsApp()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="#140f0d"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Enviar Pedido via WhatsApp
    </button>
    <button class="btnGhost" onclick="limparCarrinho()">Limpar pedido</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════
// CONFIGURAÇÃO — ALTERA AQUI QUANDO PRECISARES
// ══════════════════════════════════════════
const SB = 'https://qaseaiiemckxcwzahqew.supabase.co';   // URL do projeto Supabase GASPAR
const SK = 'sb_publishable_udpae0_ZbYBHHdm79FpC9g_-svSUg27'; // Chave publishable do Supabase GASPAR
const BUCKET = 'gaspar';                                  // <-- Nome do bucket de Storage
const WHATSAPP_NUM = '351967925745';                      // <-- Número de WhatsApp da loja (altera quando mudares de número)
const LOJA_NOME = 'GASPAR — Fragrâncias do Oriente';

function hd(){ return { 'apikey': SK, 'Authorization': 'Bearer ' + SK, 'Content-Type': 'application/json' }; }
async function api(path){
  try{
    var r = await fetch(SB + '/rest/v1/' + path, { headers: hd() });
    return r.ok ? await r.json() : [];
  }catch(e){ return []; }
}

let PERFUMES = [];
let FILTRO = 'todos';
let CART = {};

function toast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('v');
  clearTimeout(window._toastT);
  window._toastT = setTimeout(()=> t.classList.remove('v'), 2400);
}

async function iniciar(){
  PERFUMES = await api('perfumes?ativo=eq.true&order=id.desc');
  renderGrid();
}

function trocarTab(g, el){
  FILTRO = g;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  el.classList.add('on');
  posicionarIndicador(el);
  renderGrid();
}

function posicionarIndicador(el){
  var ind = document.getElementById('tabInd');
  ind.style.left = el.offsetLeft + 'px';
  ind.style.width = el.offsetWidth + 'px';
}

function generoLabel(g){
  if(g === 'M') return {txt:'Masculino', cor:'#8a97a6'};
  if(g === 'F') return {txt:'Feminino', cor:'#c9963f'};
  return {txt:'Unissexo', cor:'#7a2333'};
}

function renderGrid(){
  var lista = FILTRO === 'todos' ? PERFUMES : PERFUMES.filter(p => p.genero === FILTRO);
  var grid = document.getElementById('grid');
  var empty = document.getElementById('empty');

  if(!lista.length){
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = lista.map(function(p){
    var po = parseFloat(p.preco_orig) || 0;
    var pn = parseFloat(p.preco_novo) || 0;
    var temDesc = po > pn && po > 0;
    var gen = generoLabel(p.genero);
    var qty = CART[p.id] ? CART[p.id].qty : 0;
    return '<div class="card">' +
      '<div class="cardImg" onclick="abrirDetalhe('+p.id+')">' +
        (p.foto ? '<img src="'+p.foto+'">' : '<div class="ph">🌸</div>') +
      '</div>' +
      '<div class="cardBody">' +
        '<div class="cardNome">'+p.nome+'</div>' +
        '<div class="genRow"><span class="d" style="background:'+gen.cor+'"></span>'+gen.txt+(p.volume ? ' · '+p.volume : '')+'</div>' +
        '<div class="priceRow">' +
          (temDesc ? '<span class="priceOld">'+po.toFixed(2)+'€</span>' : '') +
          '<span class="priceNew">'+pn.toFixed(2)+'€</span>' +
        '</div>' +
        '<div class="addRow">' +
          '<button class="stepBtn" onclick="cartChange('+p.id+',-1)">−</button>' +
          '<div class="qtyNum" id="qn_'+p.id+'">'+qty+'</div>' +
          '<button class="stepBtn" onclick="cartChange('+p.id+',1)">+</button>' +
        '</div>' +
        '<button class="addBtn" onclick="cartChange('+p.id+',1)">Adicionar</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

function cartChange(id, delta){
  var p = PERFUMES.find(x => String(x.id) === String(id));
  if(!p) return;
  var key = String(id);
  if(!CART[key]) CART[key] = { p: p, qty: 0 };
  CART[key].qty = Math.max(0, CART[key].qty + delta);
  if(CART[key].qty === 0) delete CART[key];

  var el = document.getElementById('qn_' + id);
  if(el) el.textContent = CART[key] ? CART[key].qty : 0;

  var total = Object.values(CART).reduce((a,x) => a + x.qty, 0);
  var badge = document.getElementById('fabBadge');
  badge.textContent = total;
  badge.style.display = total > 0 ? 'flex' : 'none';
}

function abrirCarrinho(){
  var items = Object.values(CART);
  var lista = document.getElementById('cartLista');
  var totalVal = 0;

  if(!items.length){
    lista.innerHTML = '<p style="text-align:center;color:var(--ivory-dim);padding:20px 0">O seu pedido está vazio.</p>';
    document.getElementById('cartTotal').textContent = '0.00€';
  } else {
    lista.innerHTML = items.map(function(it){
      var pn = parseFloat(it.p.preco_novo) || 0;
      var sub = pn * it.qty;
      totalVal += sub;
      return '<div class="cItem">' +
        (it.p.foto ? '<img class="cImg" src="'+it.p.foto+'">' : '<div class="cImg"></div>') +
        '<div class="cInfo"><div class="cNome">'+it.p.nome+'</div><div class="cSub">'+it.qty+' un × '+pn.toFixed(2)+'€</div></div>' +
        '<div class="cVal">'+sub.toFixed(2)+'€</div>' +
      '</div>';
    }).join('');
    document.getElementById('cartTotal').textContent = totalVal.toFixed(2) + '€';
  }
  document.getElementById('mCart').classList.add('a');
}

function fecharModal(id){ document.getElementById(id).classList.remove('a'); }

var detalheAtualId = null;

function abrirDetalhe(id){
  var p = PERFUMES.find(x => String(x.id) === String(id));
  if(!p) return;
  detalheAtualId = p.id;

  var po = parseFloat(p.preco_orig) || 0;
  var pn = parseFloat(p.preco_novo) || 0;
  var temDesc = po > pn && po > 0;
  var gen = generoLabel(p.genero);

  document.getElementById('detImgWrap').innerHTML =
    '<button class="detailBack" onclick="fecharModal(\'mDetalhe\')">←</button>' +
    (p.foto ? '<img class="detailImg" src="'+p.foto+'">' : '<div class="detailImg" style="display:flex;align-items:center;justify-content:center;font-size:60px">🌸</div>');

  document.getElementById('detNome').textContent = p.nome;
  document.getElementById('detGen').innerHTML = '<span class="d" style="background:'+gen.cor+'"></span>'+gen.txt+(p.volume ? ' · '+p.volume : '');
  document.getElementById('detPrice').innerHTML = (temDesc ? '<span class="priceOld">'+po.toFixed(2)+'€</span>' : '') + '<span class="priceNew">'+pn.toFixed(2)+'€</span>';

  var desc = (p.descricao || '').trim();
  document.getElementById('detDescWrap').style.display = desc ? 'block' : 'none';
  document.getElementById('detDesc').textContent = desc;

  atualizarDetalheQty();
  document.getElementById('mDetalhe').classList.add('a');
}

function atualizarDetalheQty(){
  var key = String(detalheAtualId);
  var qty = CART[key] ? CART[key].qty : 0;
  var el = document.getElementById('detQty');
  if(el) el.textContent = qty;
}

function limparCarrinho(){
  if(!confirm('Limpar todo o pedido?')) return;
  CART = {};
  document.querySelectorAll('[id^="qn_"]').forEach(el => el.textContent = '0');
  document.getElementById('fabBadge').style.display = 'none';
  fecharModal('mCart');
}

function gerarTextoEncomenda(nome, notas){
  var items = Object.values(CART);
  var data = new Date().toLocaleDateString('pt-PT');
  var linhas = ['🌸 NOVO PEDIDO — ' + LOJA_NOME, '📅 ' + data, '👤 ' + nome, ''];
  var total = 0;
  items.forEach(function(it){
    var pn = parseFloat(it.p.preco_novo) || 0;
    var sub = pn * it.qty;
    total += sub;
    linhas.push('• ' + it.p.nome + (it.p.volume ? ' ('+it.p.volume+')' : '') + ' — ' + it.qty + 'un × ' + pn.toFixed(2) + '€ = ' + sub.toFixed(2) + '€');
  });
  linhas.push('');
  linhas.push('💰 TOTAL: ' + total.toFixed(2) + '€');
  if(notas && notas.trim()) { linhas.push(''); linhas.push('📝 Observações: ' + notas.trim()); }
  return linhas.join('\n');
}

function enviarWhatsApp(){
  var items = Object.values(CART);
  if(!items.length){ toast('⚠️ O pedido está vazio'); return; }
  var nome = document.getElementById('cName').value.trim();
  if(!nome){ toast('⚠️ Indique o seu nome'); return; }
  var notas = document.getElementById('cNotes').value;
  var txt = gerarTextoEncomenda(nome, notas);
  var url = 'https://wa.me/' + WHATSAPP_NUM + '?text=' + encodeURIComponent(txt);
  window.open(url, '_blank');
}

document.getElementById('tabs').addEventListener('click', function(e){
  var t = e.target.closest('.tab');
  if(!t) return;
  trocarTab(t.dataset.g, t);
});

window.addEventListener('load', function(){
  posicionarIndicador(document.querySelector('.tab.on'));
  iniciar();
});
window.addEventListener('resize', function(){
  posicionarIndicador(document.querySelector('.tab.on'));
});

// ── INSTALAR COMO APP ──
let deferredPrompt = null;

function isIOS(){ return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream; }
function isStandalone(){ return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true; }

window.addEventListener('beforeinstallprompt', function(e){
  e.preventDefault();
  deferredPrompt = e;
  if(!isStandalone()) document.getElementById('installPill').style.display = 'flex';
});

async function instalarApp(){
  if(deferredPrompt){
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    document.getElementById('installPill').style.display = 'none';
  } else if(isIOS()){
    toast('📲 Toca no botão Partilhar e depois em "Adicionar ao Ecrã Principal"');
  } else {
    toast('📲 Abre o menu do navegador e escolhe "Instalar app" ou "Adicionar ao ecrã principal"');
  }
}

window.addEventListener('appinstalled', function(){
  document.getElementById('installPill').style.display = 'none';
});

if(!isStandalone() && isIOS()){
  document.getElementById('installPill').style.display = 'flex';
}

if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
}
</script>
