<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>GASPAR — Painel Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#140f0d; --bg2:#1c1512; --bg3:#271e19;
    --gold:#c9963f; --gold-soft:#a97f3a; --oxblood:#7a2333;
    --ivory:#f3ead9; --ivory-dim:#b3a695; --line:rgba(201,150,63,.2);
    --r:#e2554f; --g:#5fae7d;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ivory);font-family:'Jost',sans-serif}
  ::selection{background:var(--gold);color:#140f0d}

  /* LOGIN */
  .loginWrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .loginBox{width:100%;max-width:320px;text-align:center}
  .brand{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:42px;letter-spacing:5px}
  .tagline{font-size:10.5px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-top:6px}
  .sub{font-size:11px;color:var(--ivory-dim);letter-spacing:2px;text-transform:uppercase;margin-top:26px;margin-bottom:14px}

  .inp,.txt,select.inp{width:100%;padding:13px 14px;background:var(--bg3);border:1px solid var(--line);border-radius:10px;
    color:var(--ivory);font-size:14px;outline:none;font-family:'Jost',sans-serif;margin-bottom:12px}
  .inp::placeholder{color:#6b6055}
  .btnGold{width:100%;padding:14px 0;border:none;border-radius:11px;background:var(--gold);color:#140f0d;
    font-weight:700;font-size:12.5px;letter-spacing:1.4px;text-transform:uppercase;cursor:pointer;font-family:'Jost',sans-serif}
  .btnGhost{width:100%;padding:11px 0;margin-top:8px;border:1px solid var(--line);border-radius:11px;background:none;
    color:var(--ivory-dim);font-size:11.5px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;font-family:'Jost',sans-serif}
  .btnDanger{background:var(--r);color:#fff}

  /* APP SHELL */
  #app{display:none;min-height:100vh}
  header{display:flex;align-items:center;justify-content:space-between;padding:18px 18px 14px;border-bottom:1px solid var(--line);
    position:sticky;top:0;background:var(--bg);z-index:30}
  .hTit{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600}
  .hSub{font-size:9.5px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-top:2px}
  .logout{background:none;border:1px solid var(--line);color:var(--ivory-dim);font-size:10.5px;letter-spacing:1px;
    text-transform:uppercase;padding:8px 12px;border-radius:8px;cursor:pointer;font-family:'Jost',sans-serif}

  .wrap{max-width:760px;margin:0 auto;padding:16px 16px 100px}
  .addBar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  .count{font-size:11.5px;color:var(--ivory-dim)}
  .btnNovo{padding:11px 18px;border:none;border-radius:10px;background:var(--gold);color:#140f0d;font-weight:700;
    font-size:12px;letter-spacing:.8px;cursor:pointer;font-family:'Jost',sans-serif}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(min-width:600px){.grid{grid-template-columns:1fr 1fr 1fr}}
  .card{background:var(--bg2);border:1px solid var(--line);border-radius:14px;overflow:hidden;position:relative}
  .card.off{opacity:.45}
  .cImg{width:100%;aspect-ratio:3/4;background:var(--bg3);display:flex;align-items:center;justify-content:center;overflow:hidden}
  .cImg img{width:100%;height:100%;object-fit:cover}
  .cImg .ph{font-size:30px;opacity:.3}
  .cBody{padding:10px 11px 11px}
  .cNome{font-size:13px;font-weight:600;line-height:1.3;min-height:34px}
  .cMeta{display:flex;justify-content:space-between;align-items:center;margin-top:4px}
  .genTag{font-size:9px;letter-spacing:.8px;text-transform:uppercase;color:var(--ivory-dim)}
  .cPrice{margin-top:6px;font-size:14px;font-weight:700;color:var(--gold)}
  .cPriceOld{font-size:11px;color:var(--ivory-dim);text-decoration:line-through;margin-right:5px}
  .cActions{display:flex;gap:6px;margin-top:9px}
  .cBtn{flex:1;padding:7px 0;border-radius:8px;border:1px solid var(--line);background:var(--bg3);color:var(--ivory);
    font-size:10.5px;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;font-family:'Jost',sans-serif}
  .offBadge{position:absolute;top:8px;right:8px;background:rgba(20,15,13,.85);border:1px solid var(--line);
    color:var(--ivory-dim);font-size:8.5px;letter-spacing:.8px;text-transform:uppercase;padding:3px 8px;border-radius:20px}

  .empty{text-align:center;padding:60px 20px;color:var(--ivory-dim)}

  /* MODAL */
  .modal{display:none;position:fixed;inset:0;z-index:200;align-items:flex-end;background:rgba(10,7,6,.6)}
  .modal.a{display:flex}
  .sheet{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:600px;margin:0 auto;padding:20px;
    max-height:92vh;overflow-y:auto;border-top:1px solid var(--line)}
  .sheetTop{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .sheetTit{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:600}
  .closeX{background:none;border:none;color:var(--ivory-dim);font-size:26px;cursor:pointer;line-height:1}
  .lbl{display:block;font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--ivory-dim);margin:12px 0 6px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .fotoBox{width:100%;aspect-ratio:16/9;background:var(--bg3);border:1px dashed var(--line);border-radius:12px;
    display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer;position:relative}
  .fotoBox img{width:100%;height:100%;object-fit:cover}
  .fotoBox .fp{font-size:12px;color:var(--ivory-dim);text-align:center;padding:10px}
  .checkRow{display:flex;align-items:center;gap:10px;margin-top:14px}
  .checkRow input{width:18px;height:18px;accent-color:var(--gold)}
  .checkRow label{font-size:12.5px;color:var(--ivory-dim)}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#0a0706;
    color:var(--ivory);padding:12px 20px;border-radius:12px;font-size:13px;z-index:999;opacity:0;
    transition:all .3s;border:1px solid var(--line);pointer-events:none;max-width:88vw;text-align:center}
  .toast.v{opacity:1;transform:translateX(-50%) translateY(0)}
  @media (prefers-reduced-motion: reduce){*{transition:none !important}}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="loginWrap" id="loginScreen">
  <div class="loginBox">
    <div class="brand">GASPAR</div>
    <div class="tagline">Fragrâncias do Oriente</div>
    <div class="sub">Painel Administrativo</div>
    <input type="password" class="inp" id="pinInput" placeholder="PIN de acesso" inputmode="numeric" onkeydown="if(event.key==='Enter')fazerLogin()">
    <button class="btnGold" onclick="fazerLogin()">ENTRAR</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div>
      <div class="hTit">GASPAR</div>
      <div class="hSub">Painel · Perfumes</div>
    </div>
    <button class="logout" onclick="sair()">Sair</button>
  </header>

  <div class="wrap">
    <div class="addBar">
      <div class="count" id="contagem">0 perfumes</div>
      <button class="btnNovo" onclick="abrirNovo()">+ Novo Perfume</button>
    </div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" style="display:none">Ainda não adicionaste nenhum perfume.</div>
  </div>
</div>

<!-- MODAL PERFUME -->
<div class="modal" id="mPerfume">
  <div class="sheet">
    <div class="sheetTop">
      <div class="sheetTit" id="mTit">Novo Perfume</div>
      <button class="closeX" onclick="fecharModal()">×</button>
    </div>

    <div class="fotoBox" onclick="document.getElementById('fFoto').click()" id="fotoPreview">
      <div class="fp">📷<br>Toca para carregar foto</div>
    </div>
    <input type="file" id="fFoto" accept="image/*" hidden onchange="prevFoto(event)">

    <label class="lbl">Nome do Perfume</label>
    <input type="text" class="inp" id="pNome" placeholder="Ex: Oud Imperial">

    <div class="row2">
      <div>
        <label class="lbl">Género</label>
        <select class="inp" id="pGenero">
          <option value="M">Masculino</option>
          <option value="F">Feminino</option>
          <option value="U">Unissexo</option>
        </select>
      </div>
      <div>
        <label class="lbl">Volume</label>
        <input type="text" class="inp" id="pVolume" placeholder="Ex: 50ml">
      </div>
    </div>

    <div class="row2">
      <div>
        <label class="lbl">Preço Original (€)</label>
        <input type="number" class="inp" id="pPrecoOrig" step="0.01" placeholder="0.00">
      </div>
      <div>
        <label class="lbl">Preço Promocional (€)</label>
        <input type="number" class="inp" id="pPrecoNovo" step="0.01" placeholder="0.00">
      </div>
    </div>

    <div class="checkRow">
      <input type="checkbox" id="pAtivo" checked>
      <label for="pAtivo">Visível na loja online</label>
    </div>

    <button class="btnGold" style="margin-top:18px" onclick="guardarPerfume()">GUARDAR</button>
    <button class="btnGhost btnDanger" id="btnApagar" style="display:none" onclick="apagarPerfume()">APAGAR PERFUME</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════
// CONFIGURAÇÃO — ALTERA AQUI QUANDO PRECISARES
// ══════════════════════════════════════════
const SB = 'https://SEU-PROJETO.supabase.co';           // <-- URL do teu projeto Supabase
const SK = 'SUA_CHAVE_PUBLICAVEL_AQUI';                   // <-- Chave anon/publishable do Supabase
const BUCKET = 'gaspar';                                  // <-- Nome do bucket de Storage
const PIN_ADMIN = '1234';                                 // <-- PIN de acesso ao painel (muda para o que quiseres)

function hd(){ return { 'apikey': SK, 'Authorization': 'Bearer ' + SK, 'Content-Type': 'application/json' }; }

function toast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('v');
  clearTimeout(window._toastT);
  window._toastT = setTimeout(()=> t.classList.remove('v'), 2600);
}

// ── LOGIN ──
function fazerLogin(){
  var pin = document.getElementById('pinInput').value;
  if(pin === PIN_ADMIN){
    sessionStorage.setItem('gaspar_logado', '1');
    entrarApp();
  } else {
    toast('❌ PIN incorreto');
  }
}
function sair(){
  sessionStorage.removeItem('gaspar_logado');
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('pinInput').value = '';
}
function entrarApp(){
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  sincronizar();
}

// ── DADOS ──
var DB = { perfumes: [] };
var editandoId = null;
var fotoTempUrl = null;

async function sincronizar(){
  try{
    var r = await fetch(SB + '/rest/v1/perfumes?order=id.desc', { headers: hd() });
    DB.perfumes = r.ok ? await r.json() : [];
  }catch(e){ DB.perfumes = []; toast('⚠️ Erro ao ligar ao Supabase'); }
  renderGrid();
}

function generoLabel(g){
  if(g === 'M') return 'Masculino';
  if(g === 'F') return 'Feminino';
  return 'Unissexo';
}

function renderGrid(){
  var grid = document.getElementById('grid');
  var empty = document.getElementById('empty');
  document.getElementById('contagem').textContent = DB.perfumes.length + ' perfume' + (DB.perfumes.length === 1 ? '' : 's');

  if(!DB.perfumes.length){
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = DB.perfumes.map(function(p){
    var po = parseFloat(p.preco_orig) || 0;
    var pn = parseFloat(p.preco_novo) || 0;
    var temDesc = po > pn && po > 0;
    return '<div class="card '+(p.ativo === false ? 'off' : '')+'" onclick="editarPerfume('+p.id+')">' +
      (p.ativo === false ? '<div class="offBadge">Oculto</div>' : '') +
      '<div class="cImg">' + (p.foto ? '<img src="'+p.foto+'">' : '<div class="ph">🌸</div>') + '</div>' +
      '<div class="cBody">' +
        '<div class="cNome">'+p.nome+'</div>' +
        '<div class="cMeta"><span class="genTag">'+generoLabel(p.genero)+'</span><span class="genTag">'+(p.volume||'')+'</span></div>' +
        '<div class="cPrice">' + (temDesc ? '<span class="cPriceOld">'+po.toFixed(2)+'€</span>' : '') + pn.toFixed(2)+'€</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

// ── MODAL ──
function abrirNovo(){
  editandoId = null;
  fotoTempUrl = null;
  document.getElementById('mTit').textContent = 'Novo Perfume';
  document.getElementById('pNome').value = '';
  document.getElementById('pGenero').value = 'M';
  document.getElementById('pVolume').value = '';
  document.getElementById('pPrecoOrig').value = '';
  document.getElementById('pPrecoNovo').value = '';
  document.getElementById('pAtivo').checked = true;
  document.getElementById('fotoPreview').innerHTML = '<div class="fp">📷<br>Toca para carregar foto</div>';
  document.getElementById('btnApagar').style.display = 'none';
  document.getElementById('mPerfume').classList.add('a');
}

function editarPerfume(id){
  var p = DB.perfumes.find(x => x.id === id);
  if(!p) return;
  editandoId = id;
  fotoTempUrl = p.foto || null;
  document.getElementById('mTit').textContent = 'Editar Perfume';
  document.getElementById('pNome').value = p.nome || '';
  document.getElementById('pGenero').value = p.genero || 'M';
  document.getElementById('pVolume').value = p.volume || '';
  document.getElementById('pPrecoOrig').value = p.preco_orig || '';
  document.getElementById('pPrecoNovo').value = p.preco_novo || '';
  document.getElementById('pAtivo').checked = p.ativo !== false;
  document.getElementById('fotoPreview').innerHTML = p.foto ? '<img src="'+p.foto+'">' : '<div class="fp">📷<br>Toca para carregar foto</div>';
  document.getElementById('btnApagar').style.display = 'block';
  document.getElementById('mPerfume').classList.add('a');
}

function fecharModal(){
  document.getElementById('mPerfume').classList.remove('a');
}

async function prevFoto(e){
  var f = e.target.files[0];
  if(!f) return;
  document.getElementById('fotoPreview').innerHTML = '<div class="fp">A carregar...</div>';
  try{
    var path = 'perfumes/p_' + Date.now() + '.jpg';
    var up = await fetch(SB + '/storage/v1/object/' + BUCKET + '/' + path, {
      method: 'POST',
      headers: { 'apikey': SK, 'Authorization': 'Bearer ' + SK, 'x-upsert': 'true' },
      body: f
    });
    if(up.ok){
      fotoTempUrl = SB + '/storage/v1/object/public/' + BUCKET + '/' + path;
      document.getElementById('fotoPreview').innerHTML = '<img src="'+fotoTempUrl+'">';
      toast('✅ Foto carregada');
    } else {
      var err = await up.text();
      document.getElementById('fotoPreview').innerHTML = '<div class="fp">📷<br>Toca para carregar foto</div>';
      toast('❌ Erro ao carregar foto');
      console.error(err);
    }
  }catch(err){
    document.getElementById('fotoPreview').innerHTML = '<div class="fp">📷<br>Toca para carregar foto</div>';
    toast('❌ Erro de ligação ao carregar foto');
  }
}

async function guardarPerfume(){
  var nome = document.getElementById('pNome').value.trim();
  if(!nome) return toast('⚠️ Indica o nome do perfume');

  var payload = {
    nome: nome,
    genero: document.getElementById('pGenero').value,
    volume: document.getElementById('pVolume').value.trim(),
    preco_orig: parseFloat(document.getElementById('pPrecoOrig').value) || 0,
    preco_novo: parseFloat(document.getElementById('pPrecoNovo').value) || 0,
    ativo: document.getElementById('pAtivo').checked,
    foto: fotoTempUrl
  };

  try{
    var res;
    if(editandoId){
      res = await fetch(SB + '/rest/v1/perfumes?id=eq.' + editandoId, { method: 'PATCH', headers: hd(), body: JSON.stringify(payload) });
    } else {
      res = await fetch(SB + '/rest/v1/perfumes', { method: 'POST', headers: hd(), body: JSON.stringify(payload) });
    }
    if(res.ok){
      toast('✅ Perfume guardado');
      fecharModal();
      await sincronizar();
    } else {
      var err = await res.text();
      toast('❌ Erro ao guardar');
      console.error(err);
    }
  }catch(err){
    toast('❌ Erro de ligação');
  }
}

async function apagarPerfume(){
  if(!editandoId) return;
  if(!confirm('Apagar este perfume definitivamente?')) return;
  try{
    var res = await fetch(SB + '/rest/v1/perfumes?id=eq.' + editandoId, { method: 'DELETE', headers: hd() });
    if(res.ok){
      toast('🗑️ Perfume apagado');
      fecharModal();
      await sincronizar();
    } else {
      toast('❌ Erro ao apagar');
    }
  }catch(err){
    toast('❌ Erro de ligação');
  }
}

// ── INÍCIO ──
window.addEventListener('load', function(){
  if(sessionStorage.getItem('gaspar_logado') === '1'){
    entrarApp();
  }
});
</script>
</body>
</html>
